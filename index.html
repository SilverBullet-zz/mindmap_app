<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#eefbf3" />
    <title>枝图 - 思维导图</title>
    <link rel="stylesheet" href="./styles.css?v=28" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand" aria-label="枝图">
          <span class="brand-mark" aria-hidden="true">
            <i></i><i></i><i></i>
          </span>
          <span>枝图</span>
        </div>
        <div class="document-title">
          <input id="document-title" value="未命名思维导图" aria-label="文档名称" />
          <span class="save-state">已保存</span>
        </div>
        <div class="top-actions">
          <button class="secondary-button" id="home-button" type="button" title="本地思维导图首页" aria-label="本地思维导图首页">
            首页
          </button>
          <button class="secondary-button open-local-button" id="open-local-button" type="button" title="打开本地 .mindmap.json 文件" aria-label="打开本地文件">
            打开本地文件
          </button>
          <button class="command-button file-button" id="save-button" type="button" title="保存工程 (Ctrl+S)" aria-label="保存工程">
            <span class="save-icon" aria-hidden="true"></span>
            <span>保存</span>
          </button>
          <input id="open-file-input" type="file" accept=".json,.mindmap.json,application/json" hidden />
          <span class="toolbar-divider"></span>
          <button class="icon-button" id="undo-button" type="button" title="撤销 (Ctrl+Z)" aria-label="撤销" disabled>
            <span aria-hidden="true">↶</span>
          </button>
          <button class="icon-button" id="redo-button" type="button" title="重做 (Ctrl+Shift+Z)" aria-label="重做" disabled>
            <span aria-hidden="true">↷</span>
          </button>
          <span class="toolbar-divider"></span>
          <div class="export-control">
            <button class="primary-button" id="export-button" type="button" aria-haspopup="menu" aria-expanded="false">
              <span class="export-icon" aria-hidden="true">↓</span>
              导出
              <span class="menu-chevron" aria-hidden="true"></span>
            </button>
            <div class="export-menu" id="export-menu" role="menu" hidden>
              <button type="button" role="menuitem" data-export-format="mindmap">
                <span class="format-badge mindmap">MAP</span>
                <span><strong>Mindmap 工程</strong><small>可继续编辑的 .mindmap.json</small></span>
              </button>
              <button type="button" role="menuitem" data-export-format="png">
                <span class="format-badge png">PNG</span>
                <span><strong>PNG 图片</strong><small>高清透明兼容图片</small></span>
              </button>
              <button type="button" role="menuitem" data-export-format="pdf">
                <span class="format-badge pdf">PDF</span>
                <span><strong>PDF 文档</strong><small>适合打印与分享</small></span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <div class="workspace">
        <aside class="tool-rail" aria-label="思维导图工具">
          <button class="tool-button active" type="button" title="选择" aria-label="选择">
            <span class="cursor-icon" aria-hidden="true"></span>
          </button>
          <button class="tool-button" id="add-button" type="button" title="添加子主题 (Tab)" aria-label="添加子主题">
            <span class="plus-icon" aria-hidden="true"></span>
          </button>
          <button class="tool-button" id="edit-button" type="button" title="编辑主题 (F2)" aria-label="编辑主题">
            <span class="edit-icon" aria-hidden="true"></span>
          </button>
          <span class="rail-divider"></span>
          <button class="tool-button" id="copy-button" type="button" title="复制主题与子主题 (Ctrl+C)" aria-label="复制主题与子主题">
            <span class="copy-icon" aria-hidden="true"></span>
          </button>
          <button class="tool-button" id="paste-button" type="button" title="粘贴到选中主题下 (Ctrl+V)" aria-label="粘贴到选中主题下" disabled>
            <span class="paste-icon" aria-hidden="true"></span>
          </button>
          <span class="rail-divider"></span>
          <button class="tool-button danger" id="delete-button" type="button" title="删除主题 (Delete)" aria-label="删除主题">
            <span class="trash-icon" aria-hidden="true"></span>
          </button>
        </aside>

        <main class="canvas-viewport" id="canvas-viewport" tabindex="0" aria-label="思维导图画布">
          <div class="canvas-grid"></div>
          <div class="selection-marquee" id="selection-marquee" hidden></div>
          <div class="mindmap-stage" id="mindmap-stage">
            <svg class="connections" id="connections" aria-hidden="true"></svg>
            <div id="nodes-layer"></div>
          </div>

          <div class="canvas-hint" id="canvas-hint">
            <span class="hint-dot"></span>
            <span id="hint-text">双击主题进行编辑</span>
          </div>

          <div class="zoom-controls" aria-label="缩放工具">
            <button id="zoom-out" type="button" title="缩小" aria-label="缩小">−</button>
            <span id="zoom-label">100%</span>
            <button id="zoom-in" type="button" title="放大" aria-label="放大">+</button>
            <span class="zoom-divider"></span>
            <button id="fit-button" type="button" title="适应画布" aria-label="适应画布">
              <span class="fit-icon" aria-hidden="true"></span>
            </button>
          </div>
        </main>
      </div>

      <section class="home-overlay" id="home-overlay" hidden aria-label="本地思维导图首页">
        <div class="home-panel">
          <div class="home-header">
            <div>
              <h1>本地思维导图</h1>
              <p>自动保存的文件会保存在此浏览器中，刷新页面后可以继续编辑。</p>
            </div>
            <div class="home-actions">
              <button class="secondary-button" id="new-local-map" type="button">新建</button>
              <button class="secondary-button" id="trash-button" type="button" aria-pressed="false">垃圾桶</button>
              <button class="icon-button" id="close-home" type="button" title="关闭首页" aria-label="关闭首页">×</button>
            </div>
          </div>
          <div class="home-list" id="home-list"></div>
        </div>
      </section>

      <section class="document-overlay" id="node-document-overlay" hidden aria-label="主题文档页面">
        <div class="document-panel">
          <header class="document-panel-header">
            <div>
              <span class="document-kicker">Markdown</span>
              <h1 id="node-document-title">主题文档</h1>
            </div>
            <div class="document-actions">
              <button class="secondary-button" id="copy-document-button" type="button">复制</button>
              <button class="secondary-button" id="insert-image-button" type="button">插入图片</button>
              <button class="icon-button" id="close-document-button" type="button" title="关闭文档" aria-label="关闭文档">×</button>
            </div>
          </header>
          <div class="document-workspace">
            <textarea id="node-document-editor" spellcheck="false" aria-label="Markdown 编辑器"></textarea>
            <article class="markdown-preview" id="node-document-preview" aria-label="Markdown 预览"></article>
          </div>
          <input id="document-image-input" type="file" accept="image/*" hidden />
        </div>
      </section>
    </div>

    <script src="./app.js?v=28"></script>
  </body>
</html>
